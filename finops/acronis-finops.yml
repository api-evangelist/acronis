specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Acronis
providerId: acronis
publisherName: Acronis International GmbH
serviceCategory: Cyber Protection / Backup / Endpoint Security
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cybersecurity
  - Data Protection
  - Backup
  - Endpoint Management
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for Acronis. Two distinct shapes — consumer / SOHO True Image as a
  fixed-tier annual subscription per device, and Cyber Protect Cloud as MSP usage-based billing per
  workload + per GB of cloud storage with optional advanced packs.
sources:
  - https://www.acronis.com/en/products/true-image/
  - https://www.acronis.com/en-us/products/cloud/cyber-protect/
billingModel:
  pricingCategory: Subscription + Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Acronis
  ServiceCategory: Cyber Protection / Backup
  ProviderName: Acronis
  PublisherName: Acronis International GmbH
  InvoiceIssuerName: Acronis International GmbH
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: protected_workload
    description: A protected workload in Cyber Protect Cloud (server, workstation, VM, mailbox, mobile,
      Microsoft 365 seat, Google Workspace seat, hosted website).
    unit: workload
    aggregation: max
    dimensions:
      - workload_type
      - tenant
      - region
  - name: cloud_storage
    description: Acronis Cloud storage consumed for backup / DR / archive.
    unit: GB
    aggregation: max
    dimensions:
      - tenant
      - storage_class
      - region
  - name: dr_compute
    description: Disaster Recovery compute points / runtime when Acronis DR is invoked.
    unit: compute-point
    aggregation: sum
    dimensions:
      - tenant
      - vm
  - name: advanced_pack
    description: Add-on packs (Advanced Backup, Advanced DR, Advanced Email Security, EDR, XDR, MDR,
      Advanced Management, Advanced DLP) attached to workloads.
    unit: workload-pack
    aggregation: max
    dimensions:
      - pack
      - tenant
  - name: device_subscription
    description: True Image annual per-device subscription seat (consumer line).
    unit: device-year
    aggregation: max
    dimensions:
      - edition
principles:
  - name: Visibility
    description: Use the Acronis Cyber Cloud Reports API and the partner portal usage reports to pull
      per-tenant workload and storage counts; True Image consumer license counts come from the personal
      account portal.
  - name: Allocation
    description: Allocate workload and storage cost to the end-customer tenant in MSP scenarios; allocate
      consumer True Image seats to the household / individual using them.
  - name: Optimization
    description: Tune backup schedules and retention policies to manage cloud-storage growth, leverage
      Acronis local-only storage where possible, deactivate unused advanced packs, and consolidate workloads
      onto a single agent rather than overlapping point tools.
  - name: Accountability
    description: MSP service-delivery owners reconcile per-tenant usage monthly; consumer True Image
      cost is owned by the individual account holder.
maintainers:
