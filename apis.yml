name: Acronis
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Data Protection
  - Endpoint Management
  - Cybersecurity
description: >-
  Acronis is a leading provider of cyber protection solutions that deliver
  innovative technology to protect data, applications, and systems from the
  ever-evolving threats of today's digital world. They offer a comprehensive
  suite of products, including backup and disaster recovery solutions, file sync
  and share services, and anti-malware protection.
created: '2025-02-17'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: acronis:account-management-api
    name: Acronis Account Management API
    tags: []
    humanURL: >-
      https://developer.acronis.com/doc/account-management/v2/reference/index.html
    properties:
      - type: Documentation
        url: https://developer.acronis.com/doc/account-management/v2/guide/index.html
    description: >-
      The Acronis Account Management API allows organizations to manage and
      automate user accounts within the Acronis platform, including creating,
      updating, and deleting users, and assigning roles and permissions.
  - aid: acronis:agent-management-rest-api
    name: Acronis Agent Management REST API
    tags: []
    humanURL: >-
      https://developer.acronis.com/doc/agents/v2/reference/index.html
    properties:
      - type: Documentation
        url: https://developer.acronis.com/doc/agents/v2/reference/index.html
    description: >-
      The Acronis Agent Management REST API allows users to remotely manage and
      monitor Acronis agents from a centralized location, including creating,
      updating, and deleting agent profiles.
  - aid: acronis:resource-and-policy-management-api
    name: Acronis Resource and Policy Management API
    tags: []
    humanURL: >-
      https://developer.acronis.com/doc/resource-policy-management/v4/reference/index.html
    properties:
      - type: Documentation
        url: >-
          https://developer.acronis.com/doc/resource-policy-management/v4/guide/index.html
    description: >-
      Acronis Resource and Policy Management API enables organizations to
      efficiently manage resources and policies within their IT infrastructure.
  - aid: acronis:task-manager-api
    name: Acronis Task Manager API
    tags: []
    humanURL: >-
      https://developer.acronis.com/doc/tasks/v2/reference/index.html
    properties:
      - type: Documentation
        url: https://developer.acronis.com/doc/tasks/v2/guide/index.html
    description: >-
      Acronis Task Manager API allows users to manage tasks and processes within
      the Acronis backup platform, including creating, editing, and monitoring
      tasks.
  - aid: acronis:advanced-automation-api
    name: Acronis Advanced Automation API
    tags: []
    humanURL: >-
      https://developer.acronis.com/doc/advanced-automation/v1/reference/index.html
    properties:
      - type: Documentation
        url: >-
          https://developer.acronis.com/doc/outbound/apis/api-library/advanced-automation/index.html
    description: >-
      The Acronis Advanced Automation API allows users to automate and
      streamline their backup and recovery processes with custom scripts and
      workflows.
  - aid: acronis:event-manager-api
    name: Acronis Event Manager API
    tags: []
    humanURL: >-
      https://developer.acronis.com/doc/events/v1/reference/index.html
    properties:
      - type: Documentation
        url: >-
          https://developer.acronis.com/doc/vendor-side/apis/api-library/events/index.html
    description: >-
      The Acronis Event Manager API allows users to monitor and manage events
      across their entire Acronis ecosystem with real-time access to event data.
  - aid: acronis:disaster-recovery-service-api
    name: Acronis Disaster Recovery Service API
    tags: []
    humanURL: >-
      https://developer.acronis.com/doc/disaster-recovery/v2/reference/index.html
    properties:
      - type: Documentation
        url: >-
          https://developer.acronis.com/doc/outbound/apis/api-library/dr/index.html
    description: >-
      The Acronis Disaster Recovery Service API allows organizations to automate
      and streamline their disaster recovery processes.
  - aid: acronis:endpoint-detection-and-response-api
    name: Acronis Endpoint Detection and Response API
    tags: []
    humanURL: >-
      https://developer.acronis.com/doc/mdr/v1/reference/index.html
    properties:
      - type: Documentation
        url: >-
          https://developer.acronis.com/doc/outbound/apis/api-library/mdr/index.html
    description: >-
      The Acronis Endpoint Detection and Response API is a comprehensive
      security solution that helps organizations detect and respond to
      cybersecurity threats in real-time.
  - aid: acronis:vault-manager-rest-api
    name: Acronis Vault Manager REST API
    tags: []
    humanURL: >-
      https://developer.acronis.com/doc/vaultman/v1/reference/index.html
    properties:
      - type: Documentation
        url: https://developer.acronis.com/doc/vaultman/v1/reference/index.html
    description: >-
      The Acronis Vault Manager REST API allows users to manage and interact
      with their Acronis Vault storage solutions programmatically.
