specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Acronis
providerId: acronis
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cybersecurity
  - Data Protection
  - Backup
  - Endpoint Management
  - Rate Limiting
description: Acronis Cyber Cloud APIs (Account Management, Tasks, Reports, Search, Notifications, etc.)
  are exposed to MSPs and ISVs through the Acronis Cyber Platform. Public developer documentation does
  not surface a fixed RPS / RPM table; throttling is applied per tenant and per API token at the gateway,
  with 429 returned when quotas are exceeded.
sources:
  - https://developer.acronis.com/
  - https://www.acronis.com/en-us/products/cloud/cyber-protect/
notes: Acronis does not publish a numeric rate-limit table on the public developer portal. Reconciled
  flag is false because per-second numbers are not provider-published.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Cyber Cloud API throttling
    scope: api-token
    metric: varies
    limit: see Acronis Cyber Platform documentation
    notes: Per-tenant throttling applied at the API gateway; specific numbers are not published publicly.
policies:
  - name: Backoff
    description: Honor 429 responses with exponential backoff and jitter; respect any Retry-After header.
  - name: Tenant Isolation
    description: Limits are scoped per Acronis tenant / partner account; sub-tenants inherit from the
      parent partner allocation.
  - name: Webhook Preference
    description: Acronis encourages event-driven integration via notifications / webhooks rather than
      polling, to reduce request volume against rate-limited endpoints.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
