naftiko: "1.0.0-alpha1"

info:
  label: Acronis Agent Management API
  description: Acronis Agent Management API for managing protection agents, update settings, and hardware nodes.
  tags:
    - Acronis
    - Agent Management
    - Backup
    - Cybersecurity
    - Endpoints
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ACRONIS_ACCESS_TOKEN: ACRONIS_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: acronis-agents
      baseUri: https://eu2-cloud.acronis.com/api/agent_manager/v2
      description: Acronis Agent Management API v2
      authentication:
        type: bearer
        token: "{{ACRONIS_ACCESS_TOKEN}}"
      resources:
        - name: agents
          path: /agents
          description: Protection agent registry
          operations:
            - name: list-agents
              method: GET
              description: List all registered Acronis protection agents
              inputParameters:
                - name: tenant_id
                  in: query
                  type: string
                  required: true
                  description: Tenant UUID
                - name: os_family
                  in: query
                  type: string
                  required: false
                  description: Filter by OS family
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-agent
              method: GET
              description: Get specific agent details
              inputParameters:
                - name: agent_id
                  in: path
                  type: string
                  required: true
                  description: Agent identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: hardware-nodes
          path: /hardware_nodes
          description: Hardware node management
          operations:
            - name: list-hardware-nodes
              method: GET
              description: List hardware nodes visible from a tenant
              inputParameters:
                - name: tenant_id
                  in: query
                  type: string
                  required: true
                  description: Tenant UUID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: acronis-agents-api
      resources:
        - path: /v1/agents
          name: agents
          description: Agent listing
          operations:
            - method: GET
              name: list-agents
              description: List agents
              call: "acronis-agents.list-agents"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: acronis-agents-mcp
      transport: http
      tools:
        - name: list-agents
          description: List Acronis protection agents registered for a tenant
          hints:
            readOnly: true
            openWorld: true
          call: "acronis-agents.list-agents"
          with:
            tenant_id: "tools.tenant_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-agent
          description: Get details about a specific Acronis agent including status and version
          hints:
            readOnly: true
            idempotent: true
          call: "acronis-agents.get-agent"
          with:
            agent_id: "tools.agent_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-hardware-nodes
          description: List hardware nodes managed by Acronis for a tenant
          hints:
            readOnly: true
            openWorld: true
          call: "acronis-agents.list-hardware-nodes"
          with:
            tenant_id: "tools.tenant_id"
          outputParameters:
            - type: object
              mapping: "$."
