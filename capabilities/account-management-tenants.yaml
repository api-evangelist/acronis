naftiko: 1.0.0-alpha2
info:
  label: Acronis Account Management API — Tenants
  description: 'Acronis Account Management API — Tenants. 6 operations. Lead operation: Acronis Search Tenants and Users.
    Self-contained Naftiko capability covering one Acronis business surface.'
  tags:
  - Acronis
  - Tenants
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACRONIS_API_KEY: ACRONIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-management-tenants
    baseUri: https://{datacenter}.acronis.com/api/2
    description: Acronis Account Management API — Tenants business capability. Self-contained, no shared references.
    resources:
    - name: search
      path: /search
      operations:
      - name: search
        method: GET
        description: Acronis Search Tenants and Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: Search query string
          required: true
        - name: tenant_id
          in: query
          type: string
          description: Scope search to a specific tenant subtree
        - name: limit
          in: query
          type: integer
          description: Maximum results to return
    - name: tenants
      path: /tenants
      operations:
      - name: listtenants
        method: GET
        description: Acronis List Tenants
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parent_id
          in: query
          type: string
          description: Filter tenants by parent tenant UUID
        - name: uuids
          in: query
          type: string
          description: Comma-separated list of tenant UUIDs to retrieve
        - name: subtree_root_id
          in: query
          type: string
          description: Root tenant UUID for subtree traversal
      - name: createtenant
        method: POST
        description: Acronis Create Tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tenants-tenant_id
      path: /tenants/{tenant_id}
      operations:
      - name: gettenant
        method: GET
        description: Acronis Get Tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Tenant UUID
          required: true
      - name: updatetenant
        method: PUT
        description: Acronis Update Tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Tenant UUID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletetenant
        method: DELETE
        description: Acronis Delete Tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Tenant UUID
          required: true
        - name: version
          in: query
          type: integer
          description: Tenant version for optimistic concurrency
          required: true
    authentication:
      type: bearer
      token: '{{env.ACRONIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: account-management-tenants-rest
    port: 8080
    description: REST adapter for Acronis Account Management API — Tenants. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/search
      name: search
      description: REST surface for search.
      operations:
      - method: GET
        name: search
        description: Acronis Search Tenants and Users
        call: account-management-tenants.search
        with:
          query: rest.query
          tenant_id: rest.tenant_id
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tenants
      name: tenants
      description: REST surface for tenants.
      operations:
      - method: GET
        name: listtenants
        description: Acronis List Tenants
        call: account-management-tenants.listtenants
        with:
          parent_id: rest.parent_id
          uuids: rest.uuids
          subtree_root_id: rest.subtree_root_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtenant
        description: Acronis Create Tenant
        call: account-management-tenants.createtenant
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tenants/{tenant-id}
      name: tenants-tenant-id
      description: REST surface for tenants-tenant_id.
      operations:
      - method: GET
        name: gettenant
        description: Acronis Get Tenant
        call: account-management-tenants.gettenant
        with:
          tenant_id: rest.tenant_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatetenant
        description: Acronis Update Tenant
        call: account-management-tenants.updatetenant
        with:
          tenant_id: rest.tenant_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetenant
        description: Acronis Delete Tenant
        call: account-management-tenants.deletetenant
        with:
          tenant_id: rest.tenant_id
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-management-tenants-mcp
    port: 9090
    transport: http
    description: MCP adapter for Acronis Account Management API — Tenants. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: acronis-search-tenants-and-users
      description: Acronis Search Tenants and Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-management-tenants.search
      with:
        query: tools.query
        tenant_id: tools.tenant_id
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-list-tenants
      description: Acronis List Tenants
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-management-tenants.listtenants
      with:
        parent_id: tools.parent_id
        uuids: tools.uuids
        subtree_root_id: tools.subtree_root_id
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-create-tenant
      description: Acronis Create Tenant
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-management-tenants.createtenant
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-get-tenant
      description: Acronis Get Tenant
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-management-tenants.gettenant
      with:
        tenant_id: tools.tenant_id
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-update-tenant
      description: Acronis Update Tenant
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: account-management-tenants.updatetenant
      with:
        tenant_id: tools.tenant_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-delete-tenant
      description: Acronis Delete Tenant
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: account-management-tenants.deletetenant
      with:
        tenant_id: tools.tenant_id
        version: tools.version
      outputParameters:
      - type: object
        mapping: $.
