naftiko: 1.0.0-alpha2
info:
  label: Acronis Agent Management REST API — Agents
  description: 'Acronis Agent Management REST API — Agents. 4 operations. Lead operation: Acronis List Agents. Self-contained
    Naftiko capability covering one Acronis business surface.'
  tags:
  - Acronis
  - Agents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACRONIS_API_KEY: ACRONIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: agent-management-agents
    baseUri: https://{datacenter}.acronis.com/api/agent_manager/v2
    description: Acronis Agent Management REST API — Agents business capability. Self-contained, no shared references.
    resources:
    - name: agents
      path: /agents
      operations:
      - name: listagents
        method: GET
        description: Acronis List Agents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: query
          type: string
          description: Tenant UUID to scope agent listing
          required: true
        - name: os_family
          in: query
          type: string
          description: Filter by operating system family
        - name: os_arch
          in: query
          type: string
          description: Filter by OS architecture
        - name: limit
          in: query
          type: integer
          description: Maximum number of agents to return
        - name: order
          in: query
          type: string
          description: Sort order (e.g., hostname asc)
      - name: deleteagents
        method: DELETE
        description: Acronis Delete Agents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ids
          in: query
          type: string
          description: Comma-separated list of agent IDs to delete
          required: true
    - name: agents-agent_id
      path: /agents/{agent_id}
      operations:
      - name: getagent
        method: GET
        description: Acronis Get Agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: agent_id
          in: path
          type: string
          description: Agent unique identifier
          required: true
      - name: deleteagent
        method: DELETE
        description: Acronis Delete Agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: agent_id
          in: path
          type: string
          description: Agent unique identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.ACRONIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: agent-management-agents-rest
    port: 8080
    description: REST adapter for Acronis Agent Management REST API — Agents. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/agents
      name: agents
      description: REST surface for agents.
      operations:
      - method: GET
        name: listagents
        description: Acronis List Agents
        call: agent-management-agents.listagents
        with:
          tenant_id: rest.tenant_id
          os_family: rest.os_family
          os_arch: rest.os_arch
          limit: rest.limit
          order: rest.order
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteagents
        description: Acronis Delete Agents
        call: agent-management-agents.deleteagents
        with:
          ids: rest.ids
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/agents/{agent-id}
      name: agents-agent-id
      description: REST surface for agents-agent_id.
      operations:
      - method: GET
        name: getagent
        description: Acronis Get Agent
        call: agent-management-agents.getagent
        with:
          agent_id: rest.agent_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteagent
        description: Acronis Delete Agent
        call: agent-management-agents.deleteagent
        with:
          agent_id: rest.agent_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: agent-management-agents-mcp
    port: 9090
    transport: http
    description: MCP adapter for Acronis Agent Management REST API — Agents. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: acronis-list-agents
      description: Acronis List Agents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agent-management-agents.listagents
      with:
        tenant_id: tools.tenant_id
        os_family: tools.os_family
        os_arch: tools.os_arch
        limit: tools.limit
        order: tools.order
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-delete-agents
      description: Acronis Delete Agents
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: agent-management-agents.deleteagents
      with:
        ids: tools.ids
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-get-agent
      description: Acronis Get Agent
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agent-management-agents.getagent
      with:
        agent_id: tools.agent_id
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-delete-agent
      description: Acronis Delete Agent
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: agent-management-agents.deleteagent
      with:
        agent_id: tools.agent_id
      outputParameters:
      - type: object
        mapping: $.
