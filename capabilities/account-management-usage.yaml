naftiko: 1.0.0-alpha2
info:
  label: Acronis Account Management API — Usage
  description: 'Acronis Account Management API — Usage. 2 operations. Lead operation: Acronis Create Usage Report. Self-contained
    Naftiko capability covering one Acronis business surface.'
  tags:
  - Acronis
  - Usage
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACRONIS_API_KEY: ACRONIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-management-usage
    baseUri: https://{datacenter}.acronis.com/api/2
    description: Acronis Account Management API — Usage business capability. Self-contained, no shared references.
    resources:
    - name: reports
      path: /reports
      operations:
      - name: createreport
        method: POST
        description: Acronis Create Usage Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tenants-tenant_id-usages
      path: /tenants/{tenant_id}/usages
      operations:
      - name: gettenantusages
        method: GET
        description: Acronis Get Tenant Usages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Tenant UUID
          required: true
        - name: edition
          in: query
          type: string
          description: Filter by edition
    authentication:
      type: bearer
      token: '{{env.ACRONIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: account-management-usage-rest
    port: 8080
    description: REST adapter for Acronis Account Management API — Usage. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/reports
      name: reports
      description: REST surface for reports.
      operations:
      - method: POST
        name: createreport
        description: Acronis Create Usage Report
        call: account-management-usage.createreport
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tenants/{tenant-id}/usages
      name: tenants-tenant-id-usages
      description: REST surface for tenants-tenant_id-usages.
      operations:
      - method: GET
        name: gettenantusages
        description: Acronis Get Tenant Usages
        call: account-management-usage.gettenantusages
        with:
          tenant_id: rest.tenant_id
          edition: rest.edition
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-management-usage-mcp
    port: 9090
    transport: http
    description: MCP adapter for Acronis Account Management API — Usage. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: acronis-create-usage-report
      description: Acronis Create Usage Report
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-management-usage.createreport
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-get-tenant-usages
      description: Acronis Get Tenant Usages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-management-usage.gettenantusages
      with:
        tenant_id: tools.tenant_id
        edition: tools.edition
      outputParameters:
      - type: object
        mapping: $.
