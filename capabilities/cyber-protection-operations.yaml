naftiko: 1.0.0-alpha2
info:
  label: Acronis Cyber Protection Operations
  description: Unified workflow for managing Acronis Cyber Protect Cloud operations including tenant administration, agent
    monitoring, backup task tracking, and usage reporting. Used by MSPs, IT administrators, and security teams to automate
    Acronis cyber protection platform management.
  tags:
  - Acronis
  - Account Management
  - Backup
  - Cybersecurity
  - Monitoring
  - MSP
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ACRONIS_ACCESS_TOKEN: ACRONIS_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: acronis-account
    baseUri: https://eu2-cloud.acronis.com/api/2
    description: Acronis Account Management API v2
    authentication:
      type: bearer
      token: '{{ACRONIS_ACCESS_TOKEN}}'
    resources:
    - name: tenants
      path: /tenants
      description: Tenant hierarchy management
      operations:
      - name: list-tenants
        method: GET
        description: List tenants in the hierarchy
        inputParameters:
        - name: parent_id
          in: query
          type: string
          required: false
          description: Parent tenant UUID filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-tenant
        method: POST
        description: Create a new tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            kind: '{{tools.kind}}'
            parent_id: '{{tools.parent_id}}'
    - name: tenant-by-id
      path: /tenants/{tenant_id}
      description: Single tenant operations
      operations:
      - name: get-tenant
        method: GET
        description: Get tenant details
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          required: true
          description: Tenant UUID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tenant-users
      path: /tenants/{tenant_id}/users
      description: Tenant user management
      operations:
      - name: list-tenant-users
        method: GET
        description: List users in a tenant
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          required: true
          description: Tenant UUID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: offering-items
      path: /tenants/{tenant_id}/offering_items
      description: Tenant licensing management
      operations:
      - name: list-offering-items
        method: GET
        description: List offering items for a tenant
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          required: true
          description: Tenant UUID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: usages
      path: /tenants/{tenant_id}/usages
      description: Tenant usage metrics
      operations:
      - name: get-tenant-usages
        method: GET
        description: Get usage metrics for a tenant
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          required: true
          description: Tenant UUID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clients
      path: /clients
      description: OAuth client management
      operations:
      - name: list-clients
        method: GET
        description: List OAuth2 clients
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      description: Cross-tenant search
      operations:
      - name: search
        method: GET
        description: Search tenants and users
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
          description: Search query string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: acronis-agents
    baseUri: https://eu2-cloud.acronis.com/api/agent_manager/v2
    description: Acronis Agent Management API v2
    authentication:
      type: bearer
      token: '{{ACRONIS_ACCESS_TOKEN}}'
    resources:
    - name: agents
      path: /agents
      description: Protection agent registry
      operations:
      - name: list-agents
        method: GET
        description: List all registered Acronis protection agents
        inputParameters:
        - name: tenant_id
          in: query
          type: string
          required: true
          description: Tenant UUID
        - name: os_family
          in: query
          type: string
          required: false
          description: Filter by OS family
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-agent
        method: GET
        description: Get specific agent details
        inputParameters:
        - name: agent_id
          in: path
          type: string
          required: true
          description: Agent identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hardware-nodes
      path: /hardware_nodes
      description: Hardware node management
      operations:
      - name: list-hardware-nodes
        method: GET
        description: List hardware nodes visible from a tenant
        inputParameters:
        - name: tenant_id
          in: query
          type: string
          required: true
          description: Tenant UUID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: acronis-tasks
    baseUri: https://eu2-cloud.acronis.com/api/task_manager/v2
    description: Acronis Task Manager API v2
    authentication:
      type: bearer
      token: '{{ACRONIS_ACCESS_TOKEN}}'
    resources:
    - name: tasks
      path: /tasks
      description: Backup and protection task monitoring
      operations:
      - name: list-tasks
        method: GET
        description: List backup tasks with filtering and pagination
        inputParameters:
        - name: tenant_id
          in: query
          type: string
          required: false
          description: Tenant UUID filter
        - name: state
          in: query
          type: string
          required: false
          description: Filter by task state
        - name: result_code
          in: query
          type: string
          required: false
          description: Filter by result code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-task
        method: GET
        description: Get task details by ID
        inputParameters:
        - name: task_id
          in: path
          type: string
          required: true
          description: Task identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: activities
      path: /activities
      description: Task activity monitoring
      operations:
      - name: list-activities
        method: GET
        description: List task activities
        inputParameters:
        - name: task_id
          in: query
          type: string
          required: false
          description: Parent task ID filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: acronis-cyber-protection-api
    description: Unified REST API for Acronis Cyber Protect Cloud platform management.
    resources:
    - path: /v1/tenants
      name: tenants
      description: Tenant hierarchy management
      operations:
      - method: GET
        name: list-tenants
        description: List tenants
        call: acronis-account.list-tenants
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-tenant
        description: Create tenant
        call: acronis-account.create-tenant
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tenants/{tenant_id}
      name: tenant
      description: Individual tenant operations
      operations:
      - method: GET
        name: get-tenant
        description: Get tenant details
        call: acronis-account.get-tenant
        with:
          tenant_id: rest.tenant_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tenants/{tenant_id}/users
      name: tenant-users
      description: Tenant user management
      operations:
      - method: GET
        name: list-tenant-users
        description: List users in a tenant
        call: acronis-account.list-tenant-users
        with:
          tenant_id: rest.tenant_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tenants/{tenant_id}/usages
      name: tenant-usages
      description: Tenant usage monitoring
      operations:
      - method: GET
        name: get-tenant-usages
        description: Get usage metrics for a tenant
        call: acronis-account.get-tenant-usages
        with:
          tenant_id: rest.tenant_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/agents
      name: agents
      description: Protection agent management
      operations:
      - method: GET
        name: list-agents
        description: List agents for a tenant
        call: acronis-agents.list-agents
        with:
          tenant_id: rest.tenant_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tasks
      name: tasks
      description: Backup task monitoring
      operations:
      - method: GET
        name: list-tasks
        description: List backup tasks
        call: acronis-tasks.list-tasks
        with:
          tenant_id: rest.tenant_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search
      name: search
      description: Cross-tenant search
      operations:
      - method: GET
        name: search
        description: Search tenants and users
        call: acronis-account.search
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: acronis-cyber-protection-mcp
    transport: http
    description: MCP server for AI-assisted Acronis Cyber Protect Cloud management.
    tools:
    - name: list-tenants
      description: List Acronis tenant hierarchy - companies, partners, and customer accounts
      hints:
        readOnly: true
        openWorld: true
      call: acronis-account.list-tenants
      with:
        parent_id: tools.parent_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-tenant
      description: Get details about a specific Acronis tenant
      hints:
        readOnly: true
        idempotent: true
      call: acronis-account.get-tenant
      with:
        tenant_id: tools.tenant_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-tenant-users
      description: List users in an Acronis tenant
      hints:
        readOnly: true
        openWorld: true
      call: acronis-account.list-tenant-users
      with:
        tenant_id: tools.tenant_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-tenant-usages
      description: Get current usage metrics for an Acronis tenant across all services
      hints:
        readOnly: true
        idempotent: true
      call: acronis-account.get-tenant-usages
      with:
        tenant_id: tools.tenant_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-agents
      description: List Acronis protection agents registered for a tenant
      hints:
        readOnly: true
        openWorld: true
      call: acronis-agents.list-agents
      with:
        tenant_id: tools.tenant_id
        os_family: tools.os_family
      outputParameters:
      - type: object
        mapping: $.
    - name: get-agent
      description: Get details about a specific Acronis backup agent including online status
      hints:
        readOnly: true
        idempotent: true
      call: acronis-agents.get-agent
      with:
        agent_id: tools.agent_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-tasks
      description: List Acronis backup tasks with filtering by state, result, policy, and resource
      hints:
        readOnly: true
        openWorld: true
      call: acronis-tasks.list-tasks
      with:
        tenant_id: tools.tenant_id
        state: tools.state
        result_code: tools.result_code
      outputParameters:
      - type: object
        mapping: $.
    - name: get-task
      description: Get details about a specific Acronis backup task
      hints:
        readOnly: true
        idempotent: true
      call: acronis-tasks.get-task
      with:
        task_id: tools.task_id
      outputParameters:
      - type: object
        mapping: $.
    - name: search
      description: Search Acronis platform for tenants and users by name or email
      hints:
        readOnly: true
        openWorld: true
      call: acronis-account.search
      with:
        query: tools.query
        tenant_id: tools.tenant_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-hardware-nodes
      description: List hardware nodes managed by Acronis for a tenant
      hints:
        readOnly: true
        openWorld: true
      call: acronis-agents.list-hardware-nodes
      with:
        tenant_id: tools.tenant_id
      outputParameters:
      - type: object
        mapping: $.
