naftiko: 1.0.0-alpha2
info:
  label: Acronis Account Management API — Users
  description: 'Acronis Account Management API — Users. 1 operations. Lead operation: Acronis List Tenant Users. Self-contained
    Naftiko capability covering one Acronis business surface.'
  tags:
  - Acronis
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACRONIS_API_KEY: ACRONIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-management-users
    baseUri: https://{datacenter}.acronis.com/api/2
    description: Acronis Account Management API — Users business capability. Self-contained, no shared references.
    resources:
    - name: tenants-tenant_id-users
      path: /tenants/{tenant_id}/users
      operations:
      - name: listtenantusers
        method: GET
        description: Acronis List Tenant Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Tenant UUID
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of results
        - name: after
          in: query
          type: string
          description: Cursor for pagination
    authentication:
      type: bearer
      token: '{{env.ACRONIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: account-management-users-rest
    port: 8080
    description: REST adapter for Acronis Account Management API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tenants/{tenant-id}/users
      name: tenants-tenant-id-users
      description: REST surface for tenants-tenant_id-users.
      operations:
      - method: GET
        name: listtenantusers
        description: Acronis List Tenant Users
        call: account-management-users.listtenantusers
        with:
          tenant_id: rest.tenant_id
          limit: rest.limit
          after: rest.after
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-management-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Acronis Account Management API — Users. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: acronis-list-tenant-users
      description: Acronis List Tenant Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-management-users.listtenantusers
      with:
        tenant_id: tools.tenant_id
        limit: tools.limit
        after: tools.after
      outputParameters:
      - type: object
        mapping: $.
