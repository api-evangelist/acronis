naftiko: 1.0.0-alpha2
info:
  label: Acronis Task Manager API — Activities
  description: 'Acronis Task Manager API — Activities. 2 operations. Lead operation: Acronis List Activities. Self-contained
    Naftiko capability covering one Acronis business surface.'
  tags:
  - Acronis
  - Activities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACRONIS_API_KEY: ACRONIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: task-manager-activities
    baseUri: https://{datacenter}.acronis.com/api/task_manager/v2
    description: Acronis Task Manager API — Activities business capability. Self-contained, no shared references.
    resources:
    - name: activities
      path: /activities
      operations:
      - name: listactivities
        method: GET
        description: Acronis List Activities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: query
          type: string
          description: Filter activities by tenant UUID
        - name: task_id
          in: query
          type: string
          description: Filter activities by parent task ID
        - name: state
          in: query
          type: string
          description: Filter by activity state
        - name: limit
          in: query
          type: integer
          description: Maximum activities to return
        - name: after
          in: query
          type: string
          description: Pagination cursor
    - name: activities-activity_id
      path: /activities/{activity_id}
      operations:
      - name: getactivity
        method: GET
        description: Acronis Get Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: activity_id
          in: path
          type: string
          description: Activity unique identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.ACRONIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: task-manager-activities-rest
    port: 8080
    description: REST adapter for Acronis Task Manager API — Activities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/activities
      name: activities
      description: REST surface for activities.
      operations:
      - method: GET
        name: listactivities
        description: Acronis List Activities
        call: task-manager-activities.listactivities
        with:
          tenant_id: rest.tenant_id
          task_id: rest.task_id
          state: rest.state
          limit: rest.limit
          after: rest.after
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/activities/{activity-id}
      name: activities-activity-id
      description: REST surface for activities-activity_id.
      operations:
      - method: GET
        name: getactivity
        description: Acronis Get Activity
        call: task-manager-activities.getactivity
        with:
          activity_id: rest.activity_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: task-manager-activities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Acronis Task Manager API — Activities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: acronis-list-activities
      description: Acronis List Activities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: task-manager-activities.listactivities
      with:
        tenant_id: tools.tenant_id
        task_id: tools.task_id
        state: tools.state
        limit: tools.limit
        after: tools.after
      outputParameters:
      - type: object
        mapping: $.
    - name: acronis-get-activity
      description: Acronis Get Activity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: task-manager-activities.getactivity
      with:
        activity_id: tools.activity_id
      outputParameters:
      - type: object
        mapping: $.
